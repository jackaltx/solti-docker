---
- name: Show status of all managed services on a host
  hosts: "{{ target | default('all') }}"
  gather_facts: false
  tasks:
    - name: Get container info for each managed service
      ansible.builtin.include_role:
        name: "{{ item | regex_replace('_svc$', '') | replace('_', '-') }}"
        tasks_from: status
      loop: "{{ group_names | select('match', '.*_svc$') | list }}"
