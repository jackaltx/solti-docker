---
# solti-docker inventory
# Pattern: central host registry (docker_hosts) + service capability groups
# Host-specific overrides (Traefik hostnames, bind IPs) are inline per capability group.

all:
  children:
    # ─── host registry ──────────────────────────────────────────────────────
    docker_hosts:
      hosts:
        dockarr:
          ansible_host: 192.168.101.7
          ansible_user: lavender
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519

        truenas:
          ansible_host: 192.168.40.6
          ansible_user: lavadmin
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519

      # ─── service capability groups ────────────────────────────────────────
      children:

        # ====================================================================
        redis_svc:
          hosts:
            dockarr:
              redis_host: "redis-true"
              redis_ui_host: "redis-true-ui"
              redis_insight_host: "redis-insight"

        # ====================================================================
        dozzle_svc:
          hosts:
            dockarr:
              dozzle_host: "dozzle"

        # ====================================================================
        cyberchef_svc:
          hosts:
            dockarr:
              cyberchef_host: "cyberchef"

        # ====================================================================
        it_tools_svc:
          hosts:
            dockarr:
              it_tools_host: "it-tools"

        # ====================================================================
        ladder_svc:
          hosts:
            dockarr:
              ladder_host: "ladder"

        # ====================================================================
        freshrss_svc:
          hosts:
            dockarr:
              freshrss_host: "rss"

        # ====================================================================
        homarr_svc:
          hosts:
            dockarr:
              homarr_host: "home"

        # ====================================================================
        gitea_svc:
          hosts:
            dockarr:
              gitea_host: "gitea"
              gitea_bind_ip: "192.168.101.7"
              gitea_ssh_port: "2222"

        # ====================================================================
        arcane_svc:
          hosts:
            dockarr:
              arcane_host: "arcane1"

        # ====================================================================
        minio_svc:
          hosts:
            dockarr:
              minio_api_host: "s3-true"
              minio_console_host: "minio-true"

        # ====================================================================
        conduit_svc:
          hosts:
            dockarr:
              conduit_host: "conduit1"

        # ====================================================================
        obsidian_svc:
          hosts:
            dockarr:
              obsidian_host: "obsidian1"
