install_root_group: "568"

# LinuxServer.io images use the apps user on TrueNAS
service_puid: "568"
service_pgid: "568"

# ── Service hostnames ─────────────────────────────────────────────────────────
vpn_torrent_qbit_host: "qbit"
vpn_torrent_media_root: "/mnt/zpool/Media"
vpn_torrent_firewall_subnets: "172.20.43.0/24"

arr_radarr_host: "radarr"
arr_sonarr_host: "sonarr"
arr_prowlarr_host: "prowlarr"
arr_media_root: "/mnt/zpool/Media"
