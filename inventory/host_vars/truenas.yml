---
# ── Connection ────────────────────────────────────────────────────────────────
ansible_host: 192.168.40.6
ansible_user: lavadmin
ansible_ssh_private_key_file: ~/.ssh/id_ed25519

# ── Host config ───────────────────────────────────────────────────────────────
docker_become: true
install_root: "/mnt/zpool/Docker"
