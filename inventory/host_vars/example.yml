---
# Copy to host_vars/<hostname>.yml and fill in values.
# Add the hostname to hosts.yml under docker_hosts and any service groups it runs.

# ── Connection ────────────────────────────────────────────────────────────────
ansible_host: 192.168.x.x
ansible_user: youruser
ansible_ssh_private_key_file: ~/.ssh/id_ed25519

# ── Host config ───────────────────────────────────────────────────────────────
# Debian/Ubuntu VM (ansible_user owns Docker dirs, no sudo needed for docker)
docker_become: false
install_root: "/home/youruser/Docker"
install_root_owner: "youruser"
install_root_group: "youruser"

# TrueNAS SCALE (docker runs as apps uid 568, sudo required)
# docker_become: true
# install_root: "/mnt/zpool/Docker"
# install_root_owner: "568"
# install_root_group: "568"
# service_puid: "568"
# service_pgid: "568"

# ── Service hostnames (only include services this host runs) ──────────────────
traefik_host: "docker"
traefik_bind_ip: "192.168.x.x"

redis_host: "redis"
redis_ui_host: "redis-ui"
redis_insight_host: "redis-insight"

dozzle_host: "dozzle"
cyberchef_host: "cyberchef"
it_tools_host: "it-tools"
ladder_host: "ladder"
freshrss_host: "rss"
homarr_host: "home"
arcane_host: "arcane"
conduit_host: "conduit"
obsidian_host: "obsidian"

gitea_host: "gitea"
gitea_bind_ip: "192.168.x.x"
gitea_ssh_port: "2222"

minio_api_host: "s3"
minio_console_host: "minio"

rustfs_api_host: "rustfs"
rustfs_console_host: "rustfs-console"

mongodb_express_host: "mongo-express"

jellyfin_host: "jellyfin"
jellyfin_media_root: "/home/youruser/Media"

vpn_torrent_qbit_host: "qbit"
vpn_torrent_media_root: "/path/to/Media"
vpn_torrent_firewall_subnets: "172.20.43.0/24"

arr_radarr_host: "radarr"
arr_sonarr_host: "sonarr"
arr_prowlarr_host: "prowlarr"
arr_media_root: "/path/to/Media"
