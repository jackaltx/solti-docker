---
# Templates the service secrets file from group_vars variables.
# Credentials come from lookup('env', 'VAR') in group_vars/<service>_svc.yml —
# operator exports them in shell before running manage-svc.sh.
- name: Template service secrets file
  become: "{{ install_root_owner != ansible_user }}"
  ansible.builtin.template:
    src: "secrets.env.j2"
    dest: "{{ service_properties.secrets_file }}"
    owner: "{{ install_root_owner }}"
    group: "{{ install_root_group }}"
    mode: "0600"
  no_log: "{{ mylab_nolog | default(true) }}"
