---
- name: Validate _base required variables
  ansible.builtin.assert:
    that:
      - service_properties.name != ""
      - service_properties.project_dir != ""
      - service_properties.stack_dir != ""
    fail_msg: "service_properties.name, project_dir, and stack_dir must all be defined"

# Projects/ — Ansible writes compose.yaml here, so ansible_user must own it.
# become is false on dockarr (ansible_user == install_root_owner),
# true on TrueNAS (lavadmin must sudo chown to apps user 568).
- name: Ensure Projects directory exists
  become: "{{ install_root_owner != ansible_user }}"
  ansible.builtin.file:
    path: "{{ service_properties.project_dir }}"
    state: directory
    owner: "{{ install_root_owner }}"
    group: "{{ install_root_group }}"
    mode: "0755"

# Stacks/ — container processes own this directory (e.g. redis uid 999).
# Ansible only ensures it exists; ownership is left to containers.
# On TrueNAS we still need become to create dirs under /mnt/zpool/.
- name: Ensure Stacks directory exists
  become: "{{ docker_become or (install_root_owner != ansible_user) }}"
  ansible.builtin.file:
    path: "{{ service_properties.stack_dir }}"
    state: directory
    mode: "0755"

- name: Create service stack subdirectories
  become: "{{ docker_become or (install_root_owner != ansible_user) }}"
  ansible.builtin.file:
    path: "{{ service_properties.stack_dir }}/{{ dir_item.path }}"
    state: directory
    mode: "{{ dir_item.mode }}"
  loop: "{{ service_properties.dirs }}"
  loop_control:
    loop_var: dir_item
  when: service_properties.dirs | length > 0

# Secrets/ — Ansible writes credentials here (mode 0700, ansible_user owns it).
- name: Ensure Secrets directory exists
  become: "{{ install_root_owner != ansible_user }}"
  ansible.builtin.file:
    path: "{{ install_root }}/Secrets"
    state: directory
    owner: "{{ install_root_owner }}"
    group: "{{ install_root_group }}"
    mode: "0700"
