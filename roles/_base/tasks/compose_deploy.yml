---
- name: Template compose.yaml
  become: "{{ install_root_owner != ansible_user }}"
  ansible.builtin.template:
    src: "compose.yaml.j2"
    dest: "{{ service_properties.project_dir }}/compose.yaml"
    owner: "{{ install_root_owner }}"
    group: "{{ install_root_group }}"
    mode: "0644"

- name: Deploy service with docker compose
  become: "{{ docker_become }}"
  community.docker.docker_compose_v2:
    project_src: "{{ service_properties.project_dir }}"
    state: present
  register: compose_result

- name: Smoke test — confirm containers are running
  become: "{{ docker_become }}"
  community.docker.docker_container_info:
    name: "{{ item }}"
  register: smoke
  failed_when: smoke.container.State.Status != 'running'
  loop: "{{ service_properties.container_names }}"
