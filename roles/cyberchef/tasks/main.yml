---
- name: Validate state parameter
  ansible.builtin.fail:
    msg: "cyberchef_state must be one of: prepare, present, absent"
  when: cyberchef_state not in ['prepare', 'present', 'absent']

- name: Prepare Cyberchef
  when: cyberchef_state == 'prepare'
  block:
    - ansible.builtin.include_tasks:
        file: "../_base/tasks/prepare.yml"

- name: Deploy Cyberchef
  when: cyberchef_state == 'present'
  block:
    - ansible.builtin.include_tasks:
        file: prepare.yml
    - ansible.builtin.include_tasks:
        file: "../_base/tasks/secrets.yml"
    - ansible.builtin.include_tasks:
        file: "../_base/tasks/compose_deploy.yml"

- name: Remove Cyberchef
  when: cyberchef_state == 'absent'
  block:
    - ansible.builtin.include_tasks:
        file: "../_base/tasks/cleanup.yml"
      vars:
        service_state: absent
