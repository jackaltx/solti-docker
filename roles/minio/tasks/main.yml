---
- name: Validate state parameter
  ansible.builtin.fail:
    msg: "minio_state must be one of: prepare, present, absent"
  when: minio_state not in ['prepare', 'present', 'absent']

- name: Validate required secrets
  ansible.builtin.fail:
    msg: "MINIO_ROOT_PASSWORD env var must be set before deploying minio"
  when:
    - minio_state == 'present'
    - minio_root_password == ''

- name: Prepare MinIO
  when: minio_state == 'prepare'
  block:
    - ansible.builtin.include_tasks:
        file: "../_base/tasks/prepare.yml"

- name: Deploy MinIO
  when: minio_state == 'present'
  block:
    - ansible.builtin.include_tasks:
        file: prepare.yml
    - ansible.builtin.include_tasks:
        file: "../_base/tasks/secrets.yml"
    - ansible.builtin.include_tasks:
        file: "../_base/tasks/compose_deploy.yml"

- name: Remove MinIO
  when: minio_state == 'absent'
  block:
    - ansible.builtin.include_tasks:
        file: "../_base/tasks/cleanup.yml"
      vars:
        service_state: absent
