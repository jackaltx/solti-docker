---
- name: Validate state parameter
  ansible.builtin.fail:
    msg: "dozzle_state must be one of: prepare, present, absent"
  when: dozzle_state not in ['prepare', 'present', 'absent']

- name: Prepare Dozzle
  when: dozzle_state == 'prepare'
  block:
    - ansible.builtin.include_tasks:
        file: "../_base/tasks/prepare.yml"

- name: Deploy Dozzle
  when: dozzle_state == 'present'
  block:
    - ansible.builtin.include_tasks:
        file: prepare.yml
    - ansible.builtin.include_tasks:
        file: "../_base/tasks/secrets.yml"
    - ansible.builtin.include_tasks:
        file: "../_base/tasks/compose_deploy.yml"

- name: Remove Dozzle
  when: dozzle_state == 'absent'
  block:
    - ansible.builtin.include_tasks:
        file: "../_base/tasks/cleanup.yml"
      vars:
        service_state: absent
