---
# One-time migration: moves gluetun/qbittorrent data from old Stacks/arr-stack/
# layout to Stacks/vpn-torrent/ before the first Ansible-managed deploy.
# Safe to run multiple times — skips if source already moved.

- name: Check for old gluetun data location
  become: "{{ docker_become or (install_root_owner != ansible_user) }}"
  ansible.builtin.stat:
    path: "{{ install_root }}/Stacks/arr-stack/gluetun"
  register: old_gluetun

- name: Check for old qbittorrent data location
  become: "{{ docker_become or (install_root_owner != ansible_user) }}"
  ansible.builtin.stat:
    path: "{{ install_root }}/Stacks/arr-stack/qbittorrent"
  register: old_qbittorrent

- name: Ensure vpn-torrent Stacks directory exists
  become: "{{ docker_become or (install_root_owner != ansible_user) }}"
  ansible.builtin.file:
    path: "{{ service_properties.stack_dir }}"
    state: directory
    mode: "0755"

- name: Move gluetun data to vpn-torrent stack dir
  become: "{{ docker_become or (install_root_owner != ansible_user) }}"
  ansible.builtin.command:
    cmd: mv "{{ install_root }}/Stacks/arr-stack/gluetun" "{{ service_properties.stack_dir }}/gluetun"
  when: old_gluetun.stat.exists

- name: Move qbittorrent data to vpn-torrent stack dir
  become: "{{ docker_become or (install_root_owner != ansible_user) }}"
  ansible.builtin.command:
    cmd: mv "{{ install_root }}/Stacks/arr-stack/qbittorrent" "{{ service_properties.stack_dir }}/qbittorrent"
  when: old_qbittorrent.stat.exists

- name: Migration summary
  ansible.builtin.debug:
    msg: >
      Migration complete.
      gluetun moved: {{ old_gluetun.stat.exists }},
      qbittorrent moved: {{ old_qbittorrent.stat.exists }}.
      Run 'vpn-torrent prepare' then 'vpn-torrent deploy' next.
