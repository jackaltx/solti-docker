---
mongodb_state: present

mongodb_image: "mongo:latest"
mongodb_express_image: "mongo-express:latest"

# Credentials via shell env: export MONGODB_ROOT_USER=... MONGODB_ROOT_PASSWORD=...
mongodb_root_user: "{{ lookup('env', 'MONGODB_ROOT_USER') | default('mongoadmin') }}"
mongodb_root_password: "{{ lookup('env', 'MONGODB_ROOT_PASSWORD') }}"

mongodb_enable_gui: true
mongodb_express_host: "mongo-express"

# Optional host port binding — empty string disables host exposure
# Set to bind_ip:27017 to expose for external connections
mongodb_host_port: ""

service_properties:
  name: "mongodb"
  project_dir: "{{ install_root }}/Projects/mongodb"
  stack_dir: "{{ install_root }}/Stacks/mongodb"
  secrets_file: "{{ install_root }}/Secrets/mongodb.env"
  container_names:
    - "mongodb"
  compose_networks:
    - "backend_storage"
  dirs:
    - {path: "data", mode: "0755"}
  delete_data: "{{ lookup('env', 'DELETE_DATA') | default(false) | bool }}"
  delete_images: "{{ lookup('env', 'DELETE_IMAGES') | default(false) | bool }}"
  images:
    - "{{ mongodb_image }}"
